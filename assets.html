<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vermögensübersicht</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f0f1a; color: #e0e0f0; font-family: 'Segoe UI', system-ui, sans-serif; padding: 24px; }
  h1 { text-align: center; font-size: 1.6rem; font-weight: 300; letter-spacing: 2px; color: #a0b0d0; margin-bottom: 4px; }
  .subtitle { text-align: center; color: #505878; font-size: 0.85rem; margin-bottom: 24px; }
  .kpis { display: flex; gap: 16px; justify-content: center; margin-bottom: 28px; flex-wrap: wrap; }
  .kpi { background: #161628; border: 1px solid #2a2a4a; border-radius: 10px; padding: 14px 24px; text-align: center; min-width: 180px; }
  .kpi-label { font-size: 0.72rem; letter-spacing: 1.5px; text-transform: uppercase; color: #6070a0; margin-bottom: 4px; }
  .kpi-value { font-size: 1.4rem; font-weight: 600; color: #c8d8f8; }
  .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .chart-bottom { margin-top: 20px; }
  .card { background: #161628; border: 1px solid #2a2a4a; border-radius: 12px; padding: 16px; }
  .card-title { font-size: 0.75rem; letter-spacing: 1.5px; text-transform: uppercase; color: #6070a0; margin-bottom: 10px; text-align: center; }
  @media (max-width: 700px) { .charts { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<h1>Vermögensübersicht</h1>
<div class="subtitle">Stand: 1. April 2026</div>

<div class="kpis">
  <div class="kpi"><div class="kpi-label">Total</div><div class="kpi-value">3'763'180 CHF</div></div>
  <div class="kpi"><div class="kpi-label">Liquide Mittel</div><div class="kpi-value">1'561'040 CHF</div></div>
  <div class="kpi"><div class="kpi-label">Immobilien</div><div class="kpi-value">2'202'140 CHF</div></div>
</div>

<div class="charts">
  <div class="card"><div class="card-title">Gesamtallokation</div><div id="pie1"></div></div>
  <div class="card"><div class="card-title">Liquide Mittel — Aufschlüsselung</div><div id="pie2"></div></div>
</div>
<div class="card chart-bottom"><div class="card-title">Alle Positionen (CHF)</div><div id="bar"></div></div>

<script>
const cat_colors = {
  'Bankkonten CH': '#4e8ef7',
  'Gold / Wertanlagen': '#f0c040',
  'Bankkonten DE': '#40c0b0',
  'Immobilien': '#9060e0'
};

// Pie 1: Top-level
Plotly.newPlot('pie1', [{
  type: 'pie',
  hole: 0.52,
  values: [1561040, 2202140],
  labels: ['Liquide Mittel', 'Immobilien'],
  marker: { colors: ['#4e8ef7', '#9060e0'] },
  textinfo: 'label+percent',
  hovertemplate: '<b>%{label}</b><br>%{value:,.0f} CHF<br>%{percent}<extra></extra>',
  textfont: { color: '#e0e0f0', size: 13 }
}], {
  paper_bgcolor: 'transparent',
  plot_bgcolor: 'transparent',
  margin: { t: 10, b: 10, l: 10, r: 10 },
  height: 280,
  showlegend: true,
  legend: { font: { color: '#a0b0d0' }, bgcolor: 'transparent' },
  annotations: [{ text: "3'763'180<br>CHF", x: 0.5, y: 0.5, font: { size: 14, color: '#c8d8f8' }, showarrow: false }]
}, { displayModeBar: false, responsive: true });

// Pie 2: Liquid breakdown
Plotly.newPlot('pie2', [{
  type: 'pie',
  hole: 0.52,
  values: [486000, 432000, 482400, 53000, 56120, 51520],
  labels: ['Raiffeisen', 'UBS', "Sogni d'oro", 'Pictet', 'SSKM', 'Sparda'],
  marker: { colors: ['#4e8ef7','#4e8ef7','#f0c040','#f0c040','#40c0b0','#40c0b0'] },
  textinfo: 'label+percent',
  hovertemplate: '<b>%{label}</b><br>%{value:,.0f} CHF<br>%{percent}<extra></extra>',
  textfont: { color: '#e0e0f0', size: 12 }
}], {
  paper_bgcolor: 'transparent',
  plot_bgcolor: 'transparent',
  margin: { t: 10, b: 10, l: 10, r: 10 },
  height: 280,
  showlegend: true,
  legend: { font: { color: '#a0b0d0' }, bgcolor: 'transparent' },
  annotations: [{ text: "1'561'040<br>CHF", x: 0.5, y: 0.5, font: { size: 13, color: '#c8d8f8' }, showarrow: false }]
}, { displayModeBar: false, responsive: true });

// Bar chart: all positions sorted ascending
const positions = [
  { name: 'Sparda',        value: 51520,   cat: 'Bankkonten DE' },
  { name: 'SSKM',          value: 56120,   cat: 'Bankkonten DE' },
  { name: 'Pictet',        value: 53000,   cat: 'Gold / Wertanlagen' },
  { name: 'UBS',           value: 432000,  cat: 'Bankkonten CH' },
  { name: "Sogni d'oro",   value: 482400,  cat: 'Gold / Wertanlagen' },
  { name: 'Raiffeisen',    value: 486000,  cat: 'Bankkonten CH' },
  { name: 'Immo München',  value: 602140,  cat: 'Immobilien' },
  { name: 'Immo CH',       value: 1600000, cat: 'Immobilien' },
].sort((a, b) => a.value - b.value);

Plotly.newPlot('bar', [{
  type: 'bar',
  orientation: 'h',
  x: positions.map(p => p.value),
  y: positions.map(p => p.name),
  marker: { color: positions.map(p => cat_colors[p.cat]) },
  text: positions.map(p => p.value.toLocaleString('de-CH') + " CHF"),
  textposition: 'outside',
  textfont: { color: '#a0b0d0', size: 12 },
  hovertemplate: '<b>%{y}</b><br>%{x:,.0f} CHF<extra></extra>',
  cliponaxis: false
}], {
  paper_bgcolor: 'transparent',
  plot_bgcolor: 'transparent',
  margin: { t: 10, b: 30, l: 110, r: 180 },
  height: 320,
  xaxis: {
    color: '#505878', gridcolor: '#1e2040', tickformat: ',.0f',
    tickfont: { color: '#505878' }, zeroline: false
  },
  yaxis: { color: '#a0b0d0', tickfont: { color: '#a0b0d0', size: 13 } }
}, { displayModeBar: false, responsive: true });
</script>
</body>
</html>
